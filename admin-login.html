
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | NYXCO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --color-nyxco-black: #0a0a0a;
            --color-nyxco-black-light: #111111;
            --color-nyxco-black-lighter: #1a1a1a;
            --color-nyxco-gold: #d4af37;
            --color-nyxco-gold-light: #f4d03f;
            --color-nyxco-gold-dark: #b8860b;
            --color-nyxco-white: #ffffff;
            --color-nyxco-gray: #888888;
            --font-display: 'Playfair Display', serif;
            --font-body: 'Inter', sans-serif;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.5s ease; }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(212,175,55,0.1); }
            50% { box-shadow: 0 0 40px rgba(212,175,55,0.3); }
        }
        .glow-effect { animation: glow 3s ease-in-out infinite; }
        
        .input-focus:focus {
            outline: none;
            border-color: var(--color-nyxco-gold);
            box-shadow: 0 0 0 3px rgba(212,175,55,0.1);
        }
    </style>
</head>
<body class="font-body bg-nyxco-black text-nyxco-white min-h-screen flex items-center justify-center p-4 relative ">
    
    <!-- Background Pattern -->
    <div class="absolute inset-0 opacity-5 pointer-events-none">
        <div class="absolute top-20 left-20 w-64 h-64 border border-nyxco-gold rounded-full"></div>
        <div class="absolute bottom-20 right-20 w-96 h-96 border border-nyxco-gold rounded-full"></div>
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] border border-nyxco-gold/30 rounded-full"></div>
    </div>

    <div class="relative z-10 w-full max-w-[420px]">
        <!-- Logo -->
        <div class="text-center mb-12">
            <a href="index.html" class="font-display text-4xl font-bold text-nyxco-gold tracking-[6px] relative inline-block no-underline">NYXCO<span class="text-sm absolute -top-1 -right-6">®</span></a>
            <p class="text-nyxco-gray text-sm mt-4 tracking-[3px] uppercase">Admin Portal</p>
        </div>

        <!-- Login Card -->
        <div class="bg-nyxco-black-light border border-nyxco-black-lighter p-10 glow-effect">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-nyxco-gold/10 border border-nyxco-gold/30 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="shield" class="w-8 h-8 text-nyxco-gold"></i>
                </div>
                <h1 class="font-display text-2xl mb-2">Secure Access</h1>
                <p class="text-nyxco-gray text-sm">Enter your credentials to continue</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-xs uppercase tracking-[2px] text-nyxco-gray mb-2 font-medium">Username</label>
                    <div class="relative">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-nyxco-gray"></i>
                        <input type="text" id="username" placeholder="Enter username" 
                            class="w-full bg-nyxco-black border border-nyxco-black-lighter text-white pl-12 pr-4 py-4 text-sm input-focus transition-all duration-300 placeholder:text-nyxco-gray/50">
                    </div>
                </div>

                <div>
                    <label class="block text-xs uppercase tracking-[2px] text-nyxco-gray mb-2 font-medium">Password</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-nyxco-gray"></i>
                        <input type="password" id="password" placeholder="Enter password" 
                            class="w-full bg-nyxco-black border border-nyxco-black-lighter text-white pl-12 pr-12 py-4 text-sm input-focus transition-all duration-300 placeholder:text-nyxco-gray/50">
                        <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-nyxco-gray hover:text-nyxco-gold transition-colors">
                            <i data-lucide="eye" class="w-5 h-5" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div id="errorMessage" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 px-4 py-3 text-sm flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4 flex-shrink-0"></i>
                    <span>Invalid credentials. Please try again.</span>
                </div>

                <button type="submit" id="loginBtn" 
                    class="w-full py-4 bg-nyxco-gold text-nyxco-black font-semibold uppercase tracking-[2px] text-sm hover:bg-nyxco-gold-light transition-all duration-300 flex items-center justify-center gap-2 cursor-pointer">
                    <span id="btnText">Sign In</span>
                    <i data-lucide="arrow-right" class="w-4 h-4" id="btnIcon"></i>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-nyxco-black-lighter text-center">
                <a href="index.html" class="text-nyxco-gray text-sm hover:text-nyxco-gold transition-colors no-underline inline-flex items-center gap-2">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Back to Website
                </a>
            </div>
        </div>

        <p class="text-center text-nyxco-gray/50 text-xs mt-8 tracking-wide">© 2026 NYXCO. All rights reserved.</p>
    </div>

    <script>
        // ========== ADMIN LOGIN JS ==========
        
        // Hardcoded credentials
        const ADMIN_CREDENTIALS = {
            username: 'nyxco_admin',
            password: 'Nyxco@2026#'
        };

        const SESSION_KEY = 'nyxco_admin_session';

        // Check if already logged in
        if (localStorage.getItem(SESSION_KEY) === 'active') {
            window.location.href = 'admin-dashboard.html';
        }

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        // Toggle password visibility
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            eyeIcon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
            lucide.createIcons();
        });

        // Login handler
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // Reset error
            errorMessage.classList.add('hidden');

            // Validate
            if (!username || !password) {
                showError('Please fill in all fields.');
                return;
            }

            // Show loading
            btnText.textContent = 'Authenticating...';
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-70', 'cursor-not-allowed');

            // Simulate auth delay
            setTimeout(() => {
                if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                    // Success
                    localStorage.setItem(SESSION_KEY, 'active');
                    localStorage.setItem('nyxco_admin_user', username);
                    
                    btnText.textContent = 'Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'admin-dashboard.html';
                    }, 500);
                } else {
                    // Failed
                    btnText.textContent = 'Sign In';
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                    
                    showError('Invalid username or password.');
                    loginForm.classList.add('shake');
                    setTimeout(() => loginForm.classList.remove('shake'), 500);
                }
            }, 800);
        });

        function showError(msg) {
            errorMessage.querySelector('span').textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        // Initialize icons
        lucide.createIcons();
    </script>
</body>
</html>
